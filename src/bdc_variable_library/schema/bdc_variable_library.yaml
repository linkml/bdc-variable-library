---
id: https://w3id.org/linkml/bdc-variable-library
name: bdc-variable-library
title: bdc-variable-library
description: |-
  LinkML models for variables in the BDC Knowledge Library
license: BSD-3-Clause
see_also:
  - https://linkml.github.io/bdc-variable-library

prefixes:
  bdc_variable_library: https://w3id.org/linkml/bdc-variable-library/
  linkml: https://w3id.org/linkml/
  biolink: https://w3id.org/biolink/vocab/
  schema: http://schema.org/
  PATO: http://purl.obolibrary.org/obo/PATO_
  example: http://www.example.org/rdf#
  bdchm: https://w3id.org/bdchm/
  OMOP: https://athena.ohdsi.org/search-terms/terms/
  OBA: http://purl.obolibrary.org/obo/OBA_
  LOINC: https://loinc.org/
  UCUM: https://units-of-measurement.org/
  UBERON: http://purl.obolibrary.org/obo/UBERON_
  MONDO: http://purl.obolibrary.org/obo/MONDO_
  HP: http://purl.obolibrary.org/obo/HP_
  MMO: http://purl.obolibrary.org/obo/MMO_
  RxNorm: http://purl.bioontology.org/ontology/RXNORM/
  ISO11179: http://purl.org/iso11179/
default_prefix: bdc_variable_library
default_range: string

imports:
  - linkml:types
  - https://raw.githubusercontent.com/linkml/linkml-microschema-profile/v0.3.0/src/linkml_microschema_profile/schema/linkml_microschema_profile
  - https://raw.githubusercontent.com/linkml/clinical-microschemas/v0.0.2/src/clinical_microschemas/schema/clinical_microschemas

classes:

  Entity:
    description: >-
      Any resource that has its own identifier
    class_uri: schema:Thing
    slots:
      - id

  Variable:
    is_a: Entity
    description: >-
      A generic grouping for any variable
    slots:
      - associated_study
      - variable_description
      - concept_type
      - variable_label
      - unit

  SingleVariable:
    is_a: Variable
    description: >-
      Represents a single entry in a data dictionary
    slots:
      - source_id
      - file_id
      - file_name
      - variable_name
      - source_variable_description
      - data_type
      - minimum_value
      - maximum_value
      - resolution
      - coded_values
      - missing_value
      - comment

  CompoundVariable:
    is_a: Variable
    description: >-
      Represents a variable and all metadata
    slots:
     - cde_id
     - bdchm_type
     - metadata
     - alert_value
     
  IntegratedVariable:
    is_a: Variable
    description: >-
      Represents a variable that contains data from multiple studies. Typically,
      some or all of the data must undergo a transformation in order to be
      successfully integrated
    slots:
      - cde_id
      - bdchm_type
      - integrates

  MissingValue:
    is_a: Entity
    description: >-
      Character used to indicate a missing value in a data set
    slots:
      - indicator_char
      - indicator_meaning

  AlertValue:
    is_a: Entity
    description: >-
      Character used to add information to a datum
    slots:
      - indicator_char
      - indicator_meaning
      
  MetadataVariable:
    is_a: Entity
    description: >-
      Specific data point used to add information to an observation. This will
      typically be a unique identifier for a SingleVariable and a slot from a 
      microschema
    slots:
      - microschema_slot
  
  CompoundHeight002:
    is_a: CompoundVariable
    description: >-
      Height variable with metadata, measured in inches and collected using a
      wall-mounted stadiometer
    instantiates:
      - HumanBodyHeightRecord002
  
  IntegratedHeight001:
    is_a: IntegratedVariable
    description: >-
      Height variable containing data from multiple studies, normalized to cm

  ResearchStudy:
    is_a: Entity
    class_uri: bdchm:ResearchStudy
    description: >-
      Name of research study that produced the variable

slots:
  id:
    identifier: true
    slot_uri: schema:identifier
    range: uriorcurie
    description: A unique identifier for a variable within BDC
  associated_study:
    slot_uri: bdchm:ResearchStudy
    range: ResearchStudy
    description: The study that produced the variable data
  source_id:
    description: >-
      Identifier used by the organization providing the variable to BDC
      to uniquely identify the variable in their system.
      In most cases this will be a phv value.
  file_id:
    description: >-
      Identifier used by the organization providing the variable to BDC
      to uniquely identify the file or data table in their system.
      In most cases this will be a pht value
  file_name:
    description: Name of file containing variable data
  variable_name:
    range: string
    description: >-
      The name of the variable according to the original data provider
      Corresponds to the VARNAME field in dbGAP
  variable_description:
    range: string
    description: >-
      Human readable description of the variable.
  source_variable_description:
    range: string
    description: >-
      Description of the variable provided by the original data provider
      Corresponds to the VARDESC field in dbGAP
  minimum_value:
    range: decimal
    description: >-
      The lowest value present in the data for this variable. Corresponds to 
      the MIN field in dbGAP
  maximum_value:
    range: decimal
    description: >-
      The highest value present in the data for this variable. Corresponds to
      the MAX field in dbGAP
  resolution:
    range: integer
    description: >-
      The number of decimal places a measurement is represented in the data.
      Corresponds to the RESOLUTION field in dbGAP
  coded_values:
    range: string
    description: >-
      Pipe-delimited string of allowable values. Should only be used if the data_type
      is enum. Corresponds to VALUES field in dbGAP
  missing_value:
    range: MissingValue
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: >-
      Sentinel value to indicate a missing value or other data nuance
  comment:
    range: string
    description: >-
      Any text comment provided by the original data provider. Corresponds to the 
      COMMENT field in dbGAP
  cde_id:
    range: uriorcurie
    description: >-
      CURIE from Condor
  variable_label:
    range: string
    description: >-
      Human readable label describing the variable
  concept_type:
    range: uriorcurie
    description: >-
      CURIE describing the main content of the variable. This can be from OBA,
      OMOP, or LOINC
  bdchm_type:
    range: BdchmTypeEnum
    description: >-
      Entity type from BDCHM that defines the variable type
  metadata: 
    range: MetadataVariable
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: >-
      List of variable identifiers providing metadata for a compound variable
  alert_value:
    range: AlertValue
    multivalued: true
    description: >-
      List of values that provide extra optional information about a variable.
      Often this is used to indicate a violation of QA/QC
  indicator_char:
    range: string
    description: >-
      Sentinel value used to add information to a datum or indicate a missing
      datum
  indicator_meaning:
    range: string
    description: >-
      Meaning of the indicator character verbatim from original data provider
      when possible
  microschema_slot:
    range: ClinicalMicroschemaEnum
    description: >-
      The slot that the variable identified in the variable path should go
  integrates:
    range: CompoundVariable
    multivalued: true
    description: >-
      List of variables combined in the IntegratedVariable

enums:

  BdchmTypeEnum:
    description: >-
      A list of BDCHM entities used to describe variables
    permissible_values:
      observation:
        meaning: bdchm:Observation
      condition:
        meaning: bdchm:Condition
      procedure:
        meaning: bdchm:Procedure
      exposure:
        meaning: bdchm:Exposure

  ClinicalMicroschemaEnum:
    description: >-
      A list of slots describing clinical measurements in microschema
    permissible_values:
      subject_identifier:
      measurement_type:
      measurement_value:
      unit:
      method:
      instrument:
      reagent_kit:
      calculated_from:
      body_location:
      body_position:
      context:
      collected_by:
      data_type:
      age_at_measurement:
      study_site:
      absolute_time:
