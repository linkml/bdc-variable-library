name: bdc-variable-library
description: LinkML models for variables in the BDC Knowledge Library
title: bdc-variable-library
see_also:
- https://linkml.github.io/bdc-variable-library
id: https://w3id.org/linkml/bdc-variable-library
imports:
- linkml:types
license: BSD-3-Clause
prefixes:
  bdc_variable_library:
    prefix_prefix: bdc_variable_library
    prefix_reference: https://w3id.org/linkml/bdc-variable-library/
  linkml:
    prefix_prefix: linkml
    prefix_reference: https://w3id.org/linkml/
  biolink:
    prefix_prefix: biolink
    prefix_reference: https://w3id.org/biolink/vocab/
  schema:
    prefix_prefix: schema
    prefix_reference: http://schema.org/
  PATO:
    prefix_prefix: PATO
    prefix_reference: http://purl.obolibrary.org/obo/PATO_
  example:
    prefix_prefix: example
    prefix_reference: http://www.example.org/rdf#
  bdchm:
    prefix_prefix: bdchm
    prefix_reference: https://w3id.org/bdchm/
default_prefix: bdc_variable_library
default_range: string
types:
  string:
    name: string
    definition_uri: https://w3id.org/linkml/String
    description: A character string
    notes:
    - In RDF serializations, a slot with range of string is treated as a literal or
      type xsd:string. If you are authoring schemas in LinkML YAML, the type is referenced
      with the lower case "string".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Text
    base: str
    uri: xsd:string
  integer:
    name: integer
    definition_uri: https://w3id.org/linkml/Integer
    description: An integer
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "integer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Integer
    base: int
    uri: xsd:integer
  boolean:
    name: boolean
    definition_uri: https://w3id.org/linkml/Boolean
    description: A binary (true or false) value
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "boolean".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Boolean
    base: Bool
    uri: xsd:boolean
    repr: bool
  float:
    name: float
    definition_uri: https://w3id.org/linkml/Float
    description: A real number that conforms to the xsd:float specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "float".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Float
    base: float
    uri: xsd:float
  double:
    name: double
    definition_uri: https://w3id.org/linkml/Double
    description: A real number that conforms to the xsd:double specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "double".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:Float
    base: float
    uri: xsd:double
  decimal:
    name: decimal
    definition_uri: https://w3id.org/linkml/Decimal
    description: A real number with arbitrary precision that conforms to the xsd:decimal
      specification
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "decimal".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    broad_mappings:
    - schema:Number
    base: Decimal
    uri: xsd:decimal
  time:
    name: time
    definition_uri: https://w3id.org/linkml/Time
    description: A time object represents a (local) time of day, independent of any
      particular day
    notes:
    - URI is dateTime because OWL reasoners do not work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "time".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Time
    base: XSDTime
    uri: xsd:time
    repr: str
  date:
    name: date
    definition_uri: https://w3id.org/linkml/Date
    description: a date (year, month and day) in an idealized calendar
    notes:
    - URI is dateTime because OWL reasoners don't work with straight date or time
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:Date
    base: XSDDate
    uri: xsd:date
    repr: str
  datetime:
    name: datetime
    definition_uri: https://w3id.org/linkml/Datetime
    description: The combination of a date and time
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    exact_mappings:
    - schema:DateTime
    base: XSDDateTime
    uri: xsd:dateTime
    repr: str
  date_or_datetime:
    name: date_or_datetime
    definition_uri: https://w3id.org/linkml/DateOrDatetime
    description: Either a date or a datetime
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "date_or_datetime".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: linkml:DateOrDatetime
    repr: str
  uriorcurie:
    name: uriorcurie
    definition_uri: https://w3id.org/linkml/Uriorcurie
    description: a URI or a CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uriorcurie".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: URIorCURIE
    uri: xsd:anyURI
    repr: str
  curie:
    name: curie
    definition_uri: https://w3id.org/linkml/Curie
    conforms_to: https://www.w3.org/TR/curie/
    description: a compact URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "curie".
    comments:
    - in RDF serializations this MUST be expanded to a URI
    - in non-RDF serializations MAY be serialized as the compact representation
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: Curie
    uri: xsd:string
    repr: str
  uri:
    name: uri
    definition_uri: https://w3id.org/linkml/Uri
    conforms_to: https://www.ietf.org/rfc/rfc3987.txt
    description: a complete URI
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "uri".
    comments:
    - in RDF serializations a slot with range of uri is treated as a literal or type
      xsd:anyURI unless it is an identifier or a reference to an identifier, in which
      case it is translated directly to a node
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    close_mappings:
    - schema:URL
    base: URI
    uri: xsd:anyURI
    repr: str
  ncname:
    name: ncname
    definition_uri: https://w3id.org/linkml/Ncname
    description: Prefix part of CURIE
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "ncname".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NCName
    uri: xsd:string
    repr: str
  objectidentifier:
    name: objectidentifier
    definition_uri: https://w3id.org/linkml/Objectidentifier
    description: A URI or CURIE that represents an object in the model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "objectidentifier".
    comments:
    - Used for inheritance and type checking
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: ElementIdentifier
    uri: shex:iri
    repr: str
  nodeidentifier:
    name: nodeidentifier
    definition_uri: https://w3id.org/linkml/Nodeidentifier
    description: A URI, CURIE or BNODE that represents a node in a model.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "nodeidentifier".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: NodeIdentifier
    uri: shex:nonLiteral
    repr: str
  jsonpointer:
    name: jsonpointer
    definition_uri: https://w3id.org/linkml/Jsonpointer
    conforms_to: https://datatracker.ietf.org/doc/html/rfc6901
    description: A string encoding a JSON Pointer. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to a valid object within the current
      instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpointer".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  jsonpath:
    name: jsonpath
    definition_uri: https://w3id.org/linkml/Jsonpath
    conforms_to: https://www.ietf.org/archive/id/draft-goessner-dispatch-jsonpath-00.html
    description: A string encoding a JSON Path. The value of the string MUST conform
      to JSON Point syntax and SHOULD dereference to zero or more valid objects within
      the current instance document when encoded in tree form.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "jsonpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
  sparqlpath:
    name: sparqlpath
    definition_uri: https://w3id.org/linkml/Sparqlpath
    conforms_to: https://www.w3.org/TR/sparql11-query/#propertypaths
    description: A string encoding a SPARQL Property Path. The value of the string
      MUST conform to SPARQL syntax and SHOULD dereference to zero or more valid objects
      within the current instance document when encoded as RDF.
    notes:
    - If you are authoring schemas in LinkML YAML, the type is referenced with the
      lower case "sparqlpath".
    from_schema: https://w3id.org/linkml/types
    imported_from: linkml:types
    base: str
    uri: xsd:string
    repr: str
enums:
  DataTypeEnum:
    name: DataTypeEnum
    definition_uri: https://w3id.org/linkml/bdc-variable-library/DataTypeEnum
    description: A category of data
    from_schema: https://w3id.org/linkml/bdc-variable-library
    permissible_values:
      NUMERIC:
        text: NUMERIC
        description: decimal or integer data type for continuous variables
      STRING:
        text: STRING
        description: free text data type
      CODE:
        text: CODE
        description: data are a list of acceptable values or a controlled vocabulary
  BdchmTypeEnum:
    name: BdchmTypeEnum
    definition_uri: https://w3id.org/linkml/bdc-variable-library/BdchmTypeEnum
    description: A list of BDCHM entities used to describe variables
    from_schema: https://w3id.org/linkml/bdc-variable-library
    permissible_values:
      OBSERVATION:
        text: OBSERVATION
        meaning: bdchm:Observation
      CONDITION:
        text: CONDITION
        meaning: bdchm:Condition
      PROCEDURE:
        text: PROCEDURE
        meaning: bdchm:Procedure
      EXPOSURE:
        text: EXPOSURE
        meaning: bdchm:Exposure
slots:
  id:
    name: id
    definition_uri: https://w3id.org/linkml/bdc-variable-library/id
    description: A unique identifier for a variable within BDC
    from_schema: https://w3id.org/linkml/bdc-variable-library
    mappings:
    - schema:identifier
    slot_uri: schema:identifier
    identifier: true
    owner: Entity
    domain_of:
    - Entity
    range: uriorcurie
    required: true
  associated_study:
    name: associated_study
    definition_uri: https://w3id.org/linkml/bdc-variable-library/associated_study
    description: The study that produced the variable data
    from_schema: https://w3id.org/linkml/bdc-variable-library
    mappings:
    - bdchm:ResearchStudy
    slot_uri: bdchm:ResearchStudy
    owner: Variable
    domain_of:
    - Variable
    range: ResearchStudy
  source_id:
    name: source_id
    definition_uri: https://w3id.org/linkml/bdc-variable-library/source_id
    description: Identifier used by the organization providing the variable to BDC
      to uniquely identify the variable in their system. In most cases this will be
      a phv value.
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:source_id
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: string
  file_id:
    name: file_id
    definition_uri: https://w3id.org/linkml/bdc-variable-library/file_id
    description: Identifier used by the organization providing the variable to BDC
      to uniquely identify the file or data table in their system. In most cases this
      will be a pht value
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:file_id
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: string
  file_name:
    name: file_name
    definition_uri: https://w3id.org/linkml/bdc-variable-library/file_name
    description: Name of file containing variable data
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:file_name
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: string
  variable_name:
    name: variable_name
    definition_uri: https://w3id.org/linkml/bdc-variable-library/variable_name
    description: The name of the variable according to the original data provider
      Corresponds to the VARNAME field in dbGAP
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:variable_name
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: string
  variable_description:
    name: variable_description
    definition_uri: https://w3id.org/linkml/bdc-variable-library/variable_description
    description: Human readable description of the variable.
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:variable_description
    owner: Variable
    domain_of:
    - Variable
    range: string
  source_variable_description:
    name: source_variable_description
    definition_uri: https://w3id.org/linkml/bdc-variable-library/source_variable_description
    description: Description of the variable provided by the original data provider
      Corresponds to the VARDESC field in dbGAP
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:source_variable_description
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: string
  data_type:
    name: data_type
    definition_uri: https://w3id.org/linkml/bdc-variable-library/data_type
    description: The data type found in this variable. Corresponds to the TYPE field
      in dbGAP
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:data_type
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: DataTypeEnum
  unit:
    name: unit
    definition_uri: https://w3id.org/linkml/bdc-variable-library/unit
    description: Ideally a unit of measure from UCUM. Corresponds to the UNITS field
      in dbGAP
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:unit
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: string
  minimum_value:
    name: minimum_value
    definition_uri: https://w3id.org/linkml/bdc-variable-library/minimum_value
    description: The lowest value present in the data for this variable. Corresponds
      to  the MIN field in dbGAP
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:minimum_value
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: decimal
  maximum_value:
    name: maximum_value
    definition_uri: https://w3id.org/linkml/bdc-variable-library/maximum_value
    description: The highest value present in the data for this variable. Corresponds
      to the MAX field in dbGAP
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:maximum_value
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: decimal
  resolution:
    name: resolution
    definition_uri: https://w3id.org/linkml/bdc-variable-library/resolution
    description: The number of decimal places a measurement is represented in the
      data. Corresponds to the RESOLUTION field in dbGAP
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:resolution
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: integer
  coded_values:
    name: coded_values
    definition_uri: https://w3id.org/linkml/bdc-variable-library/coded_values
    description: Pipe-delimited string of allowable values. Should only be used if
      the data_type is enum. Corresponds to VALUES field in dbGAP
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:coded_values
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: string
  missing_value:
    name: missing_value
    definition_uri: https://w3id.org/linkml/bdc-variable-library/missing_value
    description: Sentinel value to indicate a missing value or other data nuance
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:missing_value
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: MissingValue
    multivalued: true
  comment:
    name: comment
    definition_uri: https://w3id.org/linkml/bdc-variable-library/comment
    description: Any text comment provided by the original data provider. Corresponds
      to the  COMMENT field in dbGAP
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:comment
    owner: SingleVariable
    domain_of:
    - SingleVariable
    range: string
  cde_id:
    name: cde_id
    definition_uri: https://w3id.org/linkml/bdc-variable-library/cde_id
    description: CURIE from Condor
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:cde_id
    owner: CompoundVariable
    domain_of:
    - CompoundVariable
    range: uriorcurie
  variable_label:
    name: variable_label
    definition_uri: https://w3id.org/linkml/bdc-variable-library/variable_label
    description: Human readable label describing the variable
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:variable_label
    owner: Variable
    domain_of:
    - Variable
    range: string
  concept_type:
    name: concept_type
    definition_uri: https://w3id.org/linkml/bdc-variable-library/concept_type
    description: CURIE describing the main content of the variable. This can be from
      OBA, OMOP, or LOINC
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:concept_type
    owner: Variable
    domain_of:
    - Variable
    range: uriorcurie
  bdchm_type:
    name: bdchm_type
    definition_uri: https://w3id.org/linkml/bdc-variable-library/bdchm_type
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:bdchm_type
    owner: CompoundVariable
    domain_of:
    - CompoundVariable
    range: BdchmTypeEnum
  metadata:
    name: metadata
    definition_uri: https://w3id.org/linkml/bdc-variable-library/metadata
    description: List of variable identifiers providing metadata for a compound variable
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:metadata
    owner: CompoundVariable
    domain_of:
    - CompoundVariable
    range: string
    multivalued: true
  alert_value:
    name: alert_value
    definition_uri: https://w3id.org/linkml/bdc-variable-library/alert_value
    description: List of values that provide extra optional information about a variable.
      Often this is used to indicate a violation of QA/QC
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:alert_value
    owner: CompoundVariable
    domain_of:
    - CompoundVariable
    range: AlertValue
    multivalued: true
  indicator_char:
    name: indicator_char
    definition_uri: https://w3id.org/linkml/bdc-variable-library/indicator_char
    description: Sentinel value used to add information to a datum or indicate a missing
      datum
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:indicator_char
    owner: AlertValue
    domain_of:
    - MissingValue
    - AlertValue
    range: string
  indicator_meaning:
    name: indicator_meaning
    definition_uri: https://w3id.org/linkml/bdc-variable-library/indicator_meaning
    description: Meaning of the indicator character verbatim from original data provider
      when possible
    from_schema: https://w3id.org/linkml/bdc-variable-library
    slot_uri: bdc_variable_library:indicator_meaning
    owner: AlertValue
    domain_of:
    - MissingValue
    - AlertValue
    range: string
classes:
  Entity:
    name: Entity
    definition_uri: https://w3id.org/linkml/bdc-variable-library/Entity
    description: Any resource that has its own identifier
    from_schema: https://w3id.org/linkml/bdc-variable-library
    mappings:
    - schema:Thing
    slots:
    - id
    class_uri: schema:Thing
  Variable:
    name: Variable
    definition_uri: https://w3id.org/linkml/bdc-variable-library/Variable
    description: A generic grouping for any variable
    from_schema: https://w3id.org/linkml/bdc-variable-library
    is_a: Entity
    slots:
    - id
    - associated_study
    - variable_description
    - concept_type
    - variable_label
    class_uri: bdc_variable_library:Variable
  SingleVariable:
    name: SingleVariable
    definition_uri: https://w3id.org/linkml/bdc-variable-library/SingleVariable
    description: Represents a single entry in a data dictionary
    from_schema: https://w3id.org/linkml/bdc-variable-library
    is_a: Variable
    slots:
    - id
    - associated_study
    - variable_description
    - concept_type
    - variable_label
    - source_id
    - file_id
    - file_name
    - variable_name
    - source_variable_description
    - data_type
    - unit
    - minimum_value
    - maximum_value
    - resolution
    - coded_values
    - missing_value
    - comment
    class_uri: bdc_variable_library:SingleVariable
  CompoundVariable:
    name: CompoundVariable
    definition_uri: https://w3id.org/linkml/bdc-variable-library/CompoundVariable
    description: Represents a variable and all metadata
    from_schema: https://w3id.org/linkml/bdc-variable-library
    is_a: Variable
    slots:
    - id
    - associated_study
    - variable_description
    - concept_type
    - variable_label
    - cde_id
    - bdchm_type
    - metadata
    - alert_value
    class_uri: bdc_variable_library:CompoundVariable
  MissingValue:
    name: MissingValue
    definition_uri: https://w3id.org/linkml/bdc-variable-library/MissingValue
    description: Character used to indicate a missing value in a data set
    from_schema: https://w3id.org/linkml/bdc-variable-library
    is_a: Entity
    slots:
    - id
    - indicator_char
    - indicator_meaning
    class_uri: bdc_variable_library:MissingValue
  AlertValue:
    name: AlertValue
    definition_uri: https://w3id.org/linkml/bdc-variable-library/AlertValue
    description: Character used to add information to a datum
    from_schema: https://w3id.org/linkml/bdc-variable-library
    is_a: Entity
    slots:
    - id
    - indicator_char
    - indicator_meaning
    class_uri: bdc_variable_library:AlertValue
  ResearchStudy:
    name: ResearchStudy
